name: Release

on:
  push:
    tags:
      - 'pfs3-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., pfs3-v0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  meta:
    name: Release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - name: Parse version
        id: meta
        run: |
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG=${{ inputs.tag }}
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          VERSION=${TAG#pfs3-v}
          if [[ "$VERSION" =~ (alpha|beta|rc|-) ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi
          { echo "tag=${TAG}"; echo "version=${VERSION}"; echo "is_prerelease=${IS_PRERELEASE}"; } >> "$GITHUB_OUTPUT"

  build-cli:
    name: CLI ${{ matrix.target }}
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross tools (aarch64 musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu musl-tools
          mkdir -p .cargo
          cat >> .cargo/config.toml << 'EOF'
          [target.aarch64-unknown-linux-musl]
          linker = "aarch64-linux-gnu-gcc"
          EOF
      - name: Install musl tools (x86_64)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get install -y musl-tools
      - run: cargo build --release --target ${{ matrix.target }} -p pfs3
      - name: Create archive
        run: |
          VERSION=${{ needs.meta.outputs.version }}
          cp target/${{ matrix.target }}/release/pfs3 .
          chmod +x pfs3
          tar czf "pfs3-${VERSION}-${{ matrix.target }}.tar.gz" pfs3 README.md LICENSE
      - uses: actions/upload-artifact@v5
        with:
          name: cli-${{ matrix.target }}
          path: "*.tar.gz"

  build-fuse:
    name: FUSE ${{ matrix.target }}
    needs: meta
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install FUSE + cross tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev
          if [[ "${{ matrix.target }}" == aarch64* ]]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
            mkdir -p .cargo
            cat >> .cargo/config.toml << 'EOF'
            [target.aarch64-unknown-linux-gnu]
            linker = "aarch64-linux-gnu-gcc"
            EOF
          fi
      - name: Install macFUSE (macOS)
        if: runner.os == 'macOS'
        run: brew install macfuse
      - run: cargo build --release --target ${{ matrix.target }} -p pfs3-fuse
      - name: Create archive
        run: |
          VERSION=${{ needs.meta.outputs.version }}
          cp target/${{ matrix.target }}/release/pfs3-fuse .
          chmod +x pfs3-fuse
          tar czf "pfs3-fuse-${VERSION}-${{ matrix.target }}.tar.gz" pfs3-fuse README.md LICENSE
      - uses: actions/upload-artifact@v5
        with:
          name: fuse-${{ matrix.target }}
          path: "*.tar.gz"

  build-deb:
    name: Debian ${{ matrix.pkg }}
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - pkg: pfs3
          - pkg: pfs3-fuse
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse3-dev
          cargo install cargo-deb
      - run: cargo build --release -p ${{ matrix.pkg }}
      - run: cargo deb -p ${{ matrix.pkg }} --no-build
      - name: Copy .deb
        run: cp target/debian/*.deb .
      - uses: actions/upload-artifact@v5
        with:
          name: deb-${{ matrix.pkg }}
          path: "*.deb"

  upload-assets:
    name: Upload release assets
    needs: [meta, build-cli, build-fuse, build-deb]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Collect assets
        run: |
          mkdir release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.deb" \) -exec cp {} release-assets/ \;
          cd release-assets && sha256sum * > SHA256SUMS
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.meta.outputs.tag }}" release-assets/* \
            --repo ${{ github.repository }} --clobber

  update-homebrew:
    name: Homebrew tap
    needs: [meta, build-cli, upload-assets]
    runs-on: ubuntu-latest
    if: needs.meta.outputs.is_prerelease == 'false'
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Calculate checksums
        id: sums
        run: |
          VERSION=${{ needs.meta.outputs.version }}
          X64_SHA=$(sha256sum artifacts/cli-x86_64-apple-darwin/*.tar.gz | cut -d' ' -f1)
          ARM64_SHA=$(sha256sum artifacts/cli-aarch64-apple-darwin/*.tar.gz | cut -d' ' -f1)
          { echo "x64_sha=${X64_SHA}"; echo "arm64_sha=${ARM64_SHA}"; } >> "$GITHUB_OUTPUT"
      - name: Update tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION=${{ needs.meta.outputs.version }}
          X64_SHA=${{ steps.sums.outputs.x64_sha }}
          ARM64_SHA=${{ steps.sums.outputs.arm64_sha }}

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/metaneutrons/homebrew-tap.git"
          cd homebrew-tap
          mkdir -p Formula

          cat > Formula/pfs3.rb << EOF
          class Pfs3 < Formula
            desc "PFS3 (Amiga Professional File System III) tools"
            homepage "https://github.com/metaneutrons/pfs3"
            version "${VERSION}"
            license "LGPL-3.0-or-later"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/metaneutrons/pfs3/releases/download/pfs3-v${VERSION}/pfs3-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${X64_SHA}"
              else
                url "https://github.com/metaneutrons/pfs3/releases/download/pfs3-v${VERSION}/pfs3-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${ARM64_SHA}"
              end
            end

            def install
              bin.install "pfs3"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/pfs3 --version")
            end
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pfs3.rb
          git commit -m "Update pfs3 to ${VERSION}"
          git push

  publish-crates:
    name: crates.io
    needs: [meta, upload-assets]
    runs-on: ubuntu-latest
    if: needs.meta.outputs.is_prerelease == 'false'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p libpfs3 --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-aur:
    name: AUR ${{ matrix.pkg }}
    needs: [meta, upload-assets]
    runs-on: ubuntu-latest
    if: needs.meta.outputs.is_prerelease == 'false'
    strategy:
      matrix:
        include:
          - pkg: pfs3
            pkgbuild: aur/PKGBUILD
          - pkg: pfs3-fuse
            pkgbuild: aur/pfs3-fuse/PKGBUILD
    steps:
      - uses: actions/checkout@v5
      - name: Update PKGBUILD version
        run: |
          VERSION=${{ needs.meta.outputs.version }}
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" ${{ matrix.pkgbuild }}
          sed -i "s/^pkgrel=.*/pkgrel=1/" ${{ matrix.pkgbuild }}
      - uses: KSXGitHub/github-actions-deploy-aur@v4.1.1
        with:
          pkgname: ${{ matrix.pkg }}
          pkgbuild: ${{ matrix.pkgbuild }}
          commit_username: metaneutrons
          commit_email: aur@metaneutrons.github.io
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ needs.meta.outputs.version }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
